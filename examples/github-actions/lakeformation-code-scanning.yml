name: Lake Formation code scanning

on:
  workflow_dispatch:
  schedule:
    - cron: "31 * * * *"

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  code-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::111122223333:role/LakeFormationReadOnly
          aws-region: ap-northeast-2

      - name: Install lfpolicy
        run: python -m pip install "lfpolicy[aws]"

      - name: Check lfpolicy install
        run: lfpolicy doctor --require aws

      - name: Generate lfpolicy SARIF reports
        run: |
          mkdir -p artifacts snapshots

          lfpolicy generate policy.py --output-file policy/desired.json --check

          lfpolicy validate --desired policy/desired.json

          lfpolicy lint \
            --desired policy/desired.json \
            --output sarif \
            --output-file artifacts/lfpolicy-lint.sarif

          lfpolicy snapshot \
            --desired policy/desired.json \
            --region ap-northeast-2 \
            --output-file snapshots/prod-current.json

          lfpolicy audit \
            --desired policy/desired.json \
            --current-snapshot snapshots/prod-current.json \
            --output sarif \
            --output-file artifacts/lfpolicy-audit.sarif

      - name: Upload lfpolicy lint SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/lfpolicy-lint.sarif
          category: lfpolicy-lint

      - name: Upload lfpolicy audit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/lfpolicy-audit.sarif
          category: lfpolicy-audit

      - name: Enforce lfpolicy gates
        run: |
          set +e

          lfpolicy check \
            --desired policy/desired.json \
            --current-snapshot snapshots/prod-current.json \
            --output markdown \
            --output-file artifacts/lfpolicy-check.md \
            --fail-on-findings \
            --github-summary
          check_status=$?

          lfpolicy audit \
            --desired policy/desired.json \
            --current-snapshot snapshots/prod-current.json \
            --output markdown \
            --output-file artifacts/lfpolicy-audit.md \
            --fail-on-findings \
            --github-summary
          audit_status=$?

          if [ "$check_status" -ne 0 ] || [ "$audit_status" -ne 0 ]; then
            exit 1
          fi
