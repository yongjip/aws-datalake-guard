repos:
  - repo: local
    hooks:
      - id: lfpolicy-generate-check
        name: lfpolicy generate and check desired policy
        entry: bash -c 'lfpolicy generate policy.py --output-file policy/desired.json --force && lfpolicy check --desired policy/desired.json --fail-on-findings'
        language: system
        pass_filenames: false
        files: ^(policy\.py|policy/desired\.(json|ya?ml))$
