repos:
  - repo: local
    hooks:
      - id: lfguard-validate-desired
        name: lfguard validate desired policy
        entry: lfguard validate --desired policy/desired.yaml
        language: system
        pass_filenames: false
        files: ^policy/desired\.(json|ya?ml)$
      - id: lfguard-lint-desired
        name: lfguard lint desired policy
        entry: lfguard lint --desired policy/desired.yaml --fail-on-findings
        language: system
        pass_filenames: false
        files: ^policy/desired\.(json|ya?ml)$
