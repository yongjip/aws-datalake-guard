name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Version tag to publish, for example v0.10.0"
        required: true
        type: string
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      pypi-version-exists: ${{ steps.pypi-version.outputs.exists }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Validate release tag
        run: |
          package_version="$(python -c "import configparser; c = configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")"
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Release tag ${RELEASE_TAG} must start with v."
              exit 1
              ;;
          esac
          release_version="${RELEASE_TAG#v}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${package_version}."
            exit 1
          fi
      - name: Check PyPI version
        id: pypi-version
        run: |
          version="${RELEASE_TAG#v}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import urllib.error
          import urllib.request

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          url = "https://pypi.org/pypi/lfpolicy/{}/json".format(version)
          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  exists = False
              else:
                  raise
          print("exists={}".format(str(exists).lower()))
          PY
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build distributions
        run: python -m build
      - name: Verify distribution versions
        run: |
          version="${RELEASE_TAG#v}"
          test -f "dist/lfpolicy-${version}.tar.gz"
          test -f "dist/lfpolicy-${version}-py3-none-any.whl"
          python - <<'PY'
          import email.parser
          import os
          import tarfile
          import zipfile

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          wheel_path = "dist/lfpolicy-{}-py3-none-any.whl".format(version)
          sdist_path = "dist/lfpolicy-{}.tar.gz".format(version)

          with zipfile.ZipFile(wheel_path) as wheel:
              metadata = email.parser.Parser().parsestr(
                  wheel.read("lfpolicy-{}.dist-info/METADATA".format(version)).decode()
              )
          if metadata["Name"] != "lfpolicy" or metadata["Version"] != version:
              raise SystemExit("Wheel metadata does not match release version")

          with tarfile.open(sdist_path) as sdist:
              pkg_info = sdist.extractfile("lfpolicy-{}/PKG-INFO".format(version))
              if pkg_info is None:
                  raise SystemExit("sdist PKG-INFO is missing")
              metadata = email.parser.Parser().parsestr(pkg_info.read().decode())
          if metadata["Name"] != "lfpolicy" or metadata["Version"] != version:
              raise SystemExit("sdist metadata does not match release version")
          PY
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/lfpolicy-wheel-smoke
          /tmp/lfpolicy-wheel-smoke/bin/python -m pip install --no-index --find-links dist lfpolicy
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy --version
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy generate examples/policy.py --output-file /tmp/lfpolicy-policy.json --force
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy generate examples/policy.py --output-file /tmp/lfpolicy-policy.json --check
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy check --desired /tmp/lfpolicy-policy.json --fail-on-findings
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy bootstrap --output-dir /tmp/lfpolicy-policy-bootstrap
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy generate /tmp/lfpolicy-policy-bootstrap/policy.py --output-file /tmp/lfpolicy-policy-bootstrap/policy/desired.json --check
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy sample --output-dir /tmp/lfpolicy-demo
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy check \
            --desired /tmp/lfpolicy-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-demo/current-snapshot.json \
            --output markdown \
            --output-file /tmp/lfpolicy-check.md
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy lint --desired /tmp/lfpolicy-demo/desired.json
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy lint --desired /tmp/lfpolicy-demo/desired.json --output sarif --output-file /tmp/lfpolicy-lint.sarif
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy summary --desired /tmp/lfpolicy-demo/desired.json --current-snapshot /tmp/lfpolicy-demo/current-snapshot.json --output markdown
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy review \
            --desired /tmp/lfpolicy-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-demo/current-snapshot.json \
            --output-dir /tmp/lfpolicy-review-smoke \
            --force
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy explain \
            --desired /tmp/lfpolicy-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-demo/current-snapshot.json \
            --principal arn:aws:iam::111122223333:role/DataConsumer \
            --database sales_curated \
            --table customers \
            --permissions SELECT \
            --output json
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy explain-batch \
            --requests examples/access-requests.json \
            --current-snapshot examples/access-current-snapshot.json \
            --output json \
            --output-file /tmp/lfpolicy-explain-batch.json
          /tmp/lfpolicy-wheel-smoke/bin/lfpolicy plan \
            --desired /tmp/lfpolicy-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-demo/current-snapshot.json
          /tmp/lfpolicy-wheel-smoke/bin/python -c "from lfpolicy import CurrentStateProvider, DesiredState, CurrentState, LakePolicy, audit, explain, plan, table_creator; print(DesiredState.__name__, CurrentState.__name__, LakePolicy.__name__, CurrentStateProvider, callable(audit), callable(explain), callable(plan), callable(table_creator))"
      - uses: actions/upload-artifact@v6
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.pypi-version-exists != 'true'
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi:
    name: Verify PyPI install
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: always() && needs.build.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install published package
        run: |
          version="${RELEASE_TAG#v}"
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5 6 7 8; do
            if python -m pip install --no-cache-dir "lfpolicy==${version}"; then
              exit 0
            fi
            if [ "$attempt" -eq 8 ]; then
              exit 1
            fi
            sleep 15
          done
      - name: Smoke test published package
        run: |
          version="${RELEASE_TAG#v}"
          lfpolicy --version
          test "$(lfpolicy --version)" = "lfpolicy ${version}"
          lfpolicy bootstrap --output-dir /tmp/lfpolicy-pypi-policy
          lfpolicy generate /tmp/lfpolicy-pypi-policy/policy.py --output-file /tmp/lfpolicy-pypi-policy/policy/desired.json --check
          lfpolicy check --desired /tmp/lfpolicy-pypi-policy/policy/desired.json --fail-on-findings
          lfpolicy sample --output-dir /tmp/lfpolicy-pypi-demo
          lfpolicy check \
            --desired /tmp/lfpolicy-pypi-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-pypi-demo/current-snapshot.json \
            --fail-on-findings
          lfpolicy review \
            --desired /tmp/lfpolicy-pypi-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-pypi-demo/current-snapshot.json \
            --output-dir /tmp/lfpolicy-pypi-review \
            --force
          lfpolicy explain \
            --desired /tmp/lfpolicy-pypi-demo/desired.json \
            --current-snapshot /tmp/lfpolicy-pypi-demo/current-snapshot.json \
            --principal arn:aws:iam::111122223333:role/DataConsumer \
            --database sales_curated \
            --table customers \
            --permissions SELECT \
            --output json
          python -c 'import json, pathlib; pathlib.Path("/tmp/lfpolicy-pypi-requests.json").write_text(json.dumps({"requests": [{"id": "pypi-smoke", "principal": "arn:aws:iam::111122223333:role/DataConsumer", "database": "sales_curated", "table": "customers", "permissions": ["SELECT"]}]}), encoding="utf-8")'
          lfpolicy explain-batch \
            --requests /tmp/lfpolicy-pypi-requests.json \
            --current-snapshot /tmp/lfpolicy-pypi-demo/current-snapshot.json \
            --output json \
            --output-file /tmp/lfpolicy-pypi-explain-batch.json
          python -c "from lfpolicy import CurrentStateProvider, DesiredState, LakePolicy, explain, plan, table_creator; print(DesiredState.__name__, LakePolicy.__name__, CurrentStateProvider, callable(explain), callable(plan), callable(table_creator))"
