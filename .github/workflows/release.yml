name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Validate release tag
        run: |
          package_version="$(python -c "import configparser; c = configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")"
          release_version="${RELEASE_TAG#v}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${package_version}."
            exit 1
          fi
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build distributions
        run: python -m build
      - name: Verify distribution versions
        run: |
          version="${RELEASE_TAG#v}"
          test -f "dist/lfguard-${version}.tar.gz"
          test -f "dist/lfguard-${version}-py3-none-any.whl"
          python - <<'PY'
          import email.parser
          import os
          import tarfile
          import zipfile

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          wheel_path = "dist/lfguard-{}-py3-none-any.whl".format(version)
          sdist_path = "dist/lfguard-{}.tar.gz".format(version)

          with zipfile.ZipFile(wheel_path) as wheel:
              metadata = email.parser.Parser().parsestr(
                  wheel.read("lfguard-{}.dist-info/METADATA".format(version)).decode()
              )
          if metadata["Name"] != "lfguard" or metadata["Version"] != version:
              raise SystemExit("Wheel metadata does not match release version")

          with tarfile.open(sdist_path) as sdist:
              pkg_info = sdist.extractfile("lfguard-{}/PKG-INFO".format(version))
              if pkg_info is None:
                  raise SystemExit("sdist PKG-INFO is missing")
              metadata = email.parser.Parser().parsestr(pkg_info.read().decode())
          if metadata["Name"] != "lfguard" or metadata["Version"] != version:
              raise SystemExit("sdist metadata does not match release version")
          PY
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/lfguard-wheel-smoke
          /tmp/lfguard-wheel-smoke/bin/python -m pip install --no-index --find-links dist lfguard
          /tmp/lfguard-wheel-smoke/bin/lfguard --version
          /tmp/lfguard-wheel-smoke/bin/aws-lakeformation-guard --version
          /tmp/lfguard-wheel-smoke/bin/lfguard sample --output-dir /tmp/lfguard-demo
          /tmp/lfguard-wheel-smoke/bin/lfguard check \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json \
            --output markdown \
            --output-file /tmp/lfguard-check.md
          /tmp/lfguard-wheel-smoke/bin/lfguard lint --desired /tmp/lfguard-demo/desired.json
          /tmp/lfguard-wheel-smoke/bin/lfguard lint --desired /tmp/lfguard-demo/desired.json --output sarif --output-file /tmp/lfguard-lint.sarif
          /tmp/lfguard-wheel-smoke/bin/lfguard summary --desired /tmp/lfguard-demo/desired.json --current-snapshot /tmp/lfguard-demo/current-snapshot.json --output markdown
          /tmp/lfguard-wheel-smoke/bin/lfguard plan \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json
          /tmp/lfguard-wheel-smoke/bin/python -c "from lakeformation_guard import DesiredState, CurrentState, audit, plan; print(DesiredState.__name__, CurrentState.__name__, callable(audit), callable(plan))"
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi:
    name: Verify PyPI install
    runs-on: ubuntu-latest
    needs: publish
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install published package
        run: |
          version="${RELEASE_TAG#v}"
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5 6 7 8; do
            if python -m pip install --no-cache-dir "lfguard==${version}"; then
              exit 0
            fi
            if [ "$attempt" -eq 8 ]; then
              exit 1
            fi
            sleep 15
          done
      - name: Smoke test published package
        run: |
          version="${RELEASE_TAG#v}"
          lfguard --version
          test "$(lfguard --version)" = "lfguard ${version}"
          aws-lakeformation-guard --version
          lfguard sample --output-dir /tmp/lfguard-pypi-demo
          lfguard check \
            --desired /tmp/lfguard-pypi-demo/desired.json \
            --current-snapshot /tmp/lfguard-pypi-demo/current-snapshot.json \
            --fail-on-findings
          python -c "from lakeformation_guard import DesiredState, plan; print(DesiredState.__name__, callable(plan))"
