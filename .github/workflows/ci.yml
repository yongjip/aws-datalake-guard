name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m unittest discover -s tests

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/lfguard-wheel-smoke
          /tmp/lfguard-wheel-smoke/bin/python -m pip install --no-index --find-links dist lfguard
          /tmp/lfguard-wheel-smoke/bin/lfguard --version
          /tmp/lfguard-wheel-smoke/bin/lfguard generate examples/policy.py --output-file /tmp/lfguard-policy.json --force
          /tmp/lfguard-wheel-smoke/bin/lfguard generate examples/policy.py --output-file /tmp/lfguard-policy.json --check
          /tmp/lfguard-wheel-smoke/bin/lfguard check --desired /tmp/lfguard-policy.json --fail-on-findings
          /tmp/lfguard-wheel-smoke/bin/lfguard bootstrap --output-dir /tmp/lfguard-policy-bootstrap
          /tmp/lfguard-wheel-smoke/bin/lfguard generate /tmp/lfguard-policy-bootstrap/policy.py --output-file /tmp/lfguard-policy-bootstrap/policy/desired.json --check
          /tmp/lfguard-wheel-smoke/bin/lfguard sample --output-dir /tmp/lfguard-demo
          /tmp/lfguard-wheel-smoke/bin/lfguard check \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json \
            --output markdown \
            --output-file /tmp/lfguard-check.md
          /tmp/lfguard-wheel-smoke/bin/lfguard lint --desired /tmp/lfguard-demo/desired.json
          /tmp/lfguard-wheel-smoke/bin/lfguard lint --desired /tmp/lfguard-demo/desired.json --output sarif --output-file /tmp/lfguard-lint.sarif
          /tmp/lfguard-wheel-smoke/bin/lfguard summary --desired /tmp/lfguard-demo/desired.json --current-snapshot /tmp/lfguard-demo/current-snapshot.json --output markdown
          /tmp/lfguard-wheel-smoke/bin/lfguard review \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json \
            --output-dir /tmp/lfguard-review-smoke \
            --force
          /tmp/lfguard-wheel-smoke/bin/lfguard explain \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json \
            --principal arn:aws:iam::111122223333:role/DataConsumer \
            --database sales_curated \
            --table customers \
            --permissions SELECT \
            --output json
          /tmp/lfguard-wheel-smoke/bin/lfguard explain-batch \
            --requests examples/access-requests.json \
            --current-snapshot examples/access-current-snapshot.json \
            --output json \
            --output-file /tmp/lfguard-explain-batch.json
          /tmp/lfguard-wheel-smoke/bin/lfguard plan \
            --desired /tmp/lfguard-demo/desired.json \
            --current-snapshot /tmp/lfguard-demo/current-snapshot.json
          /tmp/lfguard-wheel-smoke/bin/python -c "from lakeformation_guard import CurrentStateProvider, DesiredState, CurrentState, LakePolicy, audit, explain, plan, table_creator; print(DesiredState.__name__, CurrentState.__name__, LakePolicy.__name__, CurrentStateProvider, callable(audit), callable(explain), callable(plan), callable(table_creator))"
      - uses: actions/upload-artifact@v6
        with:
          name: lfguard-distributions
          path: dist/
          if-no-files-found: error

  moto:
    name: Moto emulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package with Moto
        run: python -m pip install -e ".[test,mock-aws]"
      - name: Run Moto tests
        run: python -m unittest tests.test_aws_adapter_moto
