name: Feature request
description: Suggest a new lfguard workflow, resource shape, output, or integration
title: ""
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Read these before filing:

        - [docs/library-embedding-boundary.md](https://github.com/yongjip/aws-datalake-guard/blob/main/docs/library-embedding-boundary.md)
        - [docs/service-integration.md](https://github.com/yongjip/aws-datalake-guard/blob/main/docs/service-integration.md)
        - [docs/architecture.md](https://github.com/yongjip/aws-datalake-guard/blob/main/docs/architecture.md)

        If the request mixes multiple behaviors, split it into separate issues first.
  - type: checkboxes
    id: fit_checks
    attributes:
      label: Boundary checks
      description: Confirm the request still fits `lfguard` core.
      options:
        - label: This is not primarily a request-time mutation helper for one service endpoint.
          required: true
        - label: This does not add automatic apply, rollback orchestration, or approval workflow state into core.
          required: true
        - label: This keeps audit, plan, and review behavior deterministic and reviewable.
          required: true
        - label: If this touches live AWS behavior, it is a narrow adapter expansion rather than a general browse or discovery SDK.
          required: true
        - label: If this request mixes multiple behaviors, I split them into separate issues.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Lake Formation guardrail workflow is difficult today?
      placeholder: Describe the review, planning, audit, explain, or integration problem.
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Describe the command, API, report shape, or documentation you expect.
      placeholder: Explain the desired CLI, library, or report behavior.
    validations:
      required: true
  - type: textarea
    id: core_fit
    attributes:
      label: Why this belongs in lfguard
      description: Explain why this belongs in `lfguard` instead of the consuming service, approval workflow, or a raw boto3 wrapper.
      placeholder: Clarify the product-boundary case for this request.
    validations:
      required: true
  - type: textarea
    id: example_policy_or_output
    attributes:
      label: Example policy or output
      description: Paste a sanitized desired-state, current-state, plan, audit, or apply example if it helps explain the request.
      placeholder: Optional sample JSON, CLI output, or report fragment.
  - type: dropdown
    id: safety_expectations
    attributes:
      label: Safety expectations
      description: What default safety posture should this request follow?
      options:
        - Read-only only
        - Additive by default
        - Destructive only behind an allow flag
        - Not sure
    validations:
      required: true
  - type: textarea
    id: aws_scope
    attributes:
      label: AWS scope expectations
      description: If live AWS calls are involved, explain whether the scope is explicit and narrow and whether the behavior can stay in the adapter layer.
      placeholder: Write N/A if the request is AWS-free.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe whether you currently solve this with Terraform, CloudFormation, CDK, raw boto3, the AWS console, or another workflow.
      placeholder: List current workarounds or adjacent tools.
